server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API isteklerini backend'e yönlendir
    location /api/ {
        proxy_pass https://monthly-shift-calculator-job.apps.ocean-octest.yildiz.domain/api/;
        proxy_set_header Host monthly-shift-calculator-job.apps.ocean-octest.yildiz.domain;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_verify off;
    }

    # React Router için: her rotayı index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için cache (js, css, resimler)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
